@if (isOpen()) {
<!-- Overlay escuro -->
<div class="fixed inset-0 z-50 bg-black flex items-center justify-center" (click)="handleBackdropClick($event)">

  <!-- Container da story -->
  <div class="relative w-full max-w-sm h-screen max-h-[844px] bg-gray-900 overflow-hidden
                    select-none" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">

    <!-- Barras de progresso -->
    <div class="absolute top-0 left-0 right-0 z-10 flex gap-1 p-2">
      @for (story of stories(); track story.id; let i = $index) {
      <div class="flex-1 h-0.5 bg-white/30 rounded overflow-hidden">
        <div class="h-full bg-white transition-none" [style.width]="getProgressWidth(i)"></div>
      </div>
      }
    </div>

    <!-- Header: avatar + nome + botão fechar -->
    <div class="absolute top-6 left-0 right-0 z-10 flex items-center justify-between px-3">
      <div class="flex items-center gap-2">
        <img [src]="currentStory()?.imageBase64" class="w-8 h-8 rounded-full object-cover border border-white"
          alt="avatar" />
        <span class="text-white text-sm font-semibold">
          {{ currentStory()?.username }}
        </span>
        <span class="text-white/60 text-xs">
          {{ storyService.getTimeRemaining(currentStory()?.createdAt ?? 0) }}
        </span>
      </div>
      <button class="text-white p-1 rounded-full hover:bg-white/20 transition-colors" (click)="close()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Imagem da story -->
    @if (currentStory()) {
    <img [src]="currentStory()!.imageBase64" class="w-full h-full object-contain" [alt]="currentStory()!.username" />
    }

    <!-- Zonas de toque: anterior / próxima -->
    <div class="absolute inset-0 flex">
      <div class="w-1/3 h-full" (click)="prev()"></div>
      <div class="w-2/3 h-full" (click)="next()"></div>
    </div>

    <!-- Botão deletar (rodapé) -->
    <div class="absolute bottom-8 left-0 right-0 flex justify-center z-10">
      <button class="bg-red-500/80 text-white text-sm px-4 py-2 rounded-full
                     hover:bg-red-600 transition-colors backdrop-blur-sm" (click)="deleteCurrentStory()">
        🗑️ Remover story
      </button>
    </div>
  </div>
</div>
}
